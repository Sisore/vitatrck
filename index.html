<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VitaTrack</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080b10;--card:#0f1318;--surface:#161c24;--border:#1e2733;
    --accent:#00e5a0;--gold:#f5c842;--rose:#ff5f7e;--blue:#4db8ff;--purple:#b57bff;
    --text:#dde6f0;--muted:#4a5a6a;--muted2:#2a3544;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;padding-bottom:90px;overflow-x:hidden}
  .header{padding:48px 20px 14px;background:linear-gradient(180deg,#0a0e14,transparent);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
  .logo{width:40px;height:40px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px #00e5a055;flex-shrink:0}
  .header-title{font-size:19px;font-weight:800;letter-spacing:-.5px}
  .header-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}
  .tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:72px;z-index:99}
  .tab{flex:1;padding:13px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--muted);border:none;background:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;letter-spacing:.2px;font-family:'Outfit',sans-serif}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .content{padding:16px;max-width:480px;margin:0 auto}
  .page{display:none;flex-direction:column;gap:14px}
  .page.active{display:flex}
  .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;position:relative;overflow:hidden}
  .card-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px}
  .btn{border:none;border-radius:50px;font-family:'Outfit',sans-serif;font-weight:700;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
  .btn-primary{background:var(--accent);color:#000;padding:14px 36px;font-size:15px;box-shadow:0 0 24px #00e5a044}
  .btn-danger{background:var(--rose);color:#fff;padding:14px 36px;font-size:15px;box-shadow:0 0 24px #ff5f7e44}
  .btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);padding:9px 18px;font-size:13px}
  .btn-chip{background:var(--surface);border:1px solid var(--border);color:var(--accent);padding:8px 14px;font-size:12px;font-family:'DM Mono',monospace;border-radius:10px;cursor:pointer}
  .btn:active{transform:scale(.96)}

  /* STEP RING */
  .step-hero{display:flex;flex-direction:column;align-items:center;gap:16px;padding:24px 20px}
  .step-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,#00e5a00d,transparent 70%)}
  .ring-wrap{position:relative}
  .ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
  .ring-steps{font-family:'DM Mono',monospace;font-size:36px;font-weight:500;color:var(--accent);line-height:1}
  .ring-goal{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}
  .ring-emoji{font-size:20px;margin-top:4px}
  .sensor-status{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:12px;font-size:12px;font-family:'DM Mono',monospace}
  .sensor-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .sensor-active{background:var(--surface);color:var(--accent)}
  .sensor-active .sensor-dot{background:var(--accent);box-shadow:0 0 6px var(--accent);animation:pulse 1.5s ease-in-out infinite}
  .sensor-inactive{background:var(--surface);color:var(--muted)}
  .sensor-inactive .sensor-dot{background:var(--muted)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .stat-box{background:var(--surface);border-radius:14px;padding:14px 10px;text-align:center}
  .stat-icon{font-size:20px;margin-bottom:6px}
  .stat-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:500}
  .stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}
  .chip-row{display:flex;gap:8px;flex-wrap:wrap}

  /* FOOD SEARCH */
  .search-wrap{position:relative}
  .food-input{width:100%;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;color:var(--text);font-size:14px;font-family:'Outfit',sans-serif;outline:none;transition:border-color .2s}
  .food-input:focus{border-color:#00e5a088}
  .food-input::placeholder{color:var(--muted)}
  .dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:14px;z-index:200;max-height:280px;overflow-y:auto;box-shadow:0 8px 32px #00000088;display:none}
  .dropdown.open{display:block}
  .dd-item{padding:13px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
  .dd-item:last-child{border-bottom:none}
  .dd-item:active{background:var(--surface)}
  .dd-name{font-size:14px;font-weight:600}
  .dd-cals{font-size:12px;color:var(--accent);font-family:'DM Mono',monospace;margin-top:2px}
  .dd-macros{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}
  .dd-empty{padding:16px;text-align:center;color:var(--muted);font-size:13px}

  /* PORTION */
  .portion-row{display:flex;gap:8px;margin-top:10px;align-items:center}
  .portion-input{flex:1;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;font-family:'DM Mono',monospace;outline:none}
  .portion-unit{font-size:13px;color:var(--muted);white-space:nowrap}
  .add-food-btn{padding:11px 20px;background:var(--accent);border:none;border-radius:12px;color:#000;font-size:14px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}
  .add-food-btn:active{transform:scale(.95)}

  /* PROGRESS */
  .prog-row{margin-bottom:14px}
  .prog-header{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;font-weight:600}
  .prog-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}
  .prog-track{height:6px;background:var(--muted2);border-radius:99px;overflow:hidden}
  .prog-fill{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.4,0,.2,1)}

  /* MACRO GRID */
  .macro-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .macro-box{background:var(--surface);border-radius:14px;padding:14px}
  .macro-num{font-family:'DM Mono',monospace;font-size:22px;font-weight:500}
  .macro-unit{font-size:11px;color:var(--muted)}
  .macro-name{font-size:12px;color:var(--muted);margin-top:4px}
  .micro-row{margin-bottom:13px}
  .micro-header{display:flex;justify-content:space-between;margin-bottom:5px}
  .micro-name{font-size:13px;font-weight:500}
  .micro-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
  .micro-track{height:4px;background:var(--muted2);border-radius:99px}
  .micro-fill{height:100%;border-radius:99px;transition:width .7s ease}
  .food-item{background:var(--surface);border-radius:14px;padding:13px 14px;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
  .food-item-name{font-size:14px;font-weight:600;margin-bottom:3px}
  .food-item-portion{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:6px}
  .food-macros{display:flex;gap:10px;flex-wrap:wrap}
  .food-macro-tag{font-family:'DM Mono',monospace;font-size:11px}
  .del-btn{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 6px}
  .macro-rings{display:flex;justify-content:space-around;align-items:center}
  .macro-ring-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
  .macro-ring-lbl{font-size:10px;color:var(--muted);letter-spacing:.5px;font-weight:600;text-transform:uppercase}
  .empty{text-align:center;padding:48px 20px;color:var(--muted)}
  .empty-icon{font-size:52px;margin-bottom:12px}
  .empty-title{font-size:15px;font-weight:600;margin-bottom:4px}
  .empty-sub{font-size:13px}
  .selected-food-preview{background:var(--surface);border-radius:12px;padding:12px 14px;margin-top:10px;display:none}
  .sfp-name{font-size:14px;font-weight:700;margin-bottom:4px}
  .sfp-per{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:8px}
  .sfp-macros{display:flex;gap:12px;flex-wrap:wrap}
  .sfp-tag{font-size:12px;font-family:'DM Mono',monospace}
</style>
</head>
<body>

<div class="header">
  <div class="logo">💚</div>
  <div>
    <div class="header-title">VitaTrack</div>
    <div class="header-sub" id="dateLabel"></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('dashboard')">📊 Özet</button>
  <button class="tab" onclick="switchTab('steps')">👟 Adım</button>
  <button class="tab" onclick="switchTab('nutrition')">🥗 Beslenme</button>
</div>

<div class="content">

  <!-- DASHBOARD -->
  <div class="page active" id="page-dashboard">
    <div class="card">
      <div class="card-title">Günlük Makrolar</div>
      <div class="macro-rings" id="macroRings"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px" id="dashStats"></div>
    <div class="card">
      <div class="card-title">Hedefler</div>
      <div id="dashProgress"></div>
    </div>
  </div>

  <!-- STEPS -->
  <div class="page" id="page-steps">
    <div class="card step-hero">
      <div class="ring-wrap">
        <svg width="210" height="210" style="transform:rotate(-90deg)">
          <circle cx="105" cy="105" r="92" fill="none" stroke="#1e2733" stroke-width="13"/>
          <circle id="stepRingArc" cx="105" cy="105" r="92" fill="none" stroke="#00e5a0" stroke-width="13"
            stroke-dasharray="0 578" stroke-linecap="round"
            style="transition:stroke-dasharray .5s ease;filter:drop-shadow(0 0 10px #00e5a0)"/>
        </svg>
        <div class="ring-label">
          <div class="ring-steps" id="stepDisplay">0</div>
          <div class="ring-goal">/ 10.000</div>
          <div class="ring-emoji" id="stepEmoji">🧍</div>
        </div>
      </div>
      <div class="sensor-status sensor-inactive" id="sensorStatus">
        <div class="sensor-dot"></div>
        <span id="sensorText">Başlatmak için butona bas</span>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" id="startBtn">▶ Başlat</button>
        <button class="btn btn-ghost" id="resetBtn">Sıfırla</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">İstatistikler</div>
      <div class="stat-grid" id="stepStats"></div>
    </div>
    <div class="card">
      <div class="card-title">Manuel Ekle</div>
      <div class="chip-row" id="manualChips"></div>
    </div>
  </div>

  <!-- NUTRITION -->
  <div class="page" id="page-nutrition">
    <div class="card">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px">🔍 Yiyecek Ara</div>
      <div class="search-wrap">
        <input class="food-input" id="foodSearch" placeholder="Yiyecek adı yaz... (örn: yumurta)" autocomplete="off" oninput="onSearch(this.value)" onfocus="onSearch(this.value)">
        <div class="dropdown" id="dropdown"></div>
      </div>
      <div class="selected-food-preview" id="selectedPreview">
        <div class="sfp-name" id="prevName"></div>
        <div class="sfp-per" id="prevPer"></div>
        <div class="sfp-macros" id="prevMacros"></div>
        <div class="portion-row">
          <input class="portion-input" id="portionInput" type="number" value="100" min="1" max="5000" oninput="updatePreview()">
          <span class="portion-unit" id="portionUnit">g</span>
          <button class="add-food-btn" onclick="confirmAdd()">Ekle ✓</button>
        </div>
      </div>
      <!-- Kategori hızlı erişim -->
      <div style="margin-top:14px">
        <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Hızlı Seç</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap" id="categoryChips"></div>
      </div>
    </div>

    <div class="card" id="macroSummaryCard" style="display:none">
      <div class="card-title">Toplam Makrolar</div>
      <div class="macro-grid" id="macroSummary"></div>
    </div>
    <div class="card" id="microCard" style="display:none">
      <div class="card-title">Mikro Besinler</div>
      <div id="microNutrients"></div>
    </div>
    <div class="card" id="foodListCard" style="display:none">
      <div class="card-title">Bugün Yediklerim</div>
      <div id="foodList"></div>
    </div>
    <div class="empty" id="emptyState">
      <div class="empty-icon">🥗</div>
      <div class="empty-title">Henüz yiyecek eklemediniz</div>
      <div class="empty-sub">Yukarıdan arama yaparak ekleyebilirsiniz</div>
    </div>
  </div>

</div>

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active',['dashboard','steps','nutrition'][i]===tab);
  });
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='dashboard') renderDashboard();
}

// ════════════════════════════════════════════
// FOOD SEARCH
// ════════════════════════════════════════════
function onSearch(q) {
  q = q.trim().toLowerCase();
  const dd = document.getElementById('dropdown');
  if (!q) { dd.innerHTML=''; dd.classList.remove('open'); return; }

  const results = DB.filter(f =>
    f.name.toLowerCase().includes(q) || f.cat.toLowerCase().includes(q)
  ).slice(0,12);

  if (!results.length) {
    dd.innerHTML = `<div class="dd-empty">Sonuç bulunamadı. Başka bir kelime dene.</div>`;
  } else {
    dd.innerHTML = results.map(f => {
      const cals = Math.round(f.c * f.unitG / 100);
      return `<div class="dd-item" onclick="selectFood(${f.id})">
        <div class="dd-name">${f.name}</div>
        <div class="dd-cals">${cals} kcal / ${f.unitG}${f.unit==='g'||f.unit==='ml'?f.unit:' '+f.unit}</div>
        <div class="dd-macros">P:${(f.p*f.unitG/100).toFixed(1)}g · K:${(f.k*f.unitG/100).toFixed(1)}g · Y:${(f.y*f.unitG/100).toFixed(1)}g</div>
      </div>`;
    }).join('');
  }
  dd.classList.add('open');
}

function filterCat(cat) {
  document.getElementById('foodSearch').value = cat.replace(/^.+?\s/,'');
  onSearch(cat.replace(/^.+?\s/,''));
}

function closeDropdown() {
  document.getElementById('dropdown').classList.remove('open');
}

function selectFood(id) {
  selectedFood = DB.find(f=>f.id===id);
  document.getElementById('foodSearch').value = selectedFood.name;
  closeDropdown();
  document.getElementById('portionInput').value = selectedFood.unitG;
  document.getElementById('portionUnit').textContent = selectedFood.unit === 'g' ? 'g' : selectedFood.unit === 'ml' ? 'ml' : selectedFood.unit + ` (≈${selectedFood.unitG}g)`;
  updatePreview();
  document.getElementById('selectedPreview').style.display = 'block';
}

function updatePreview() {
  if (!selectedFood) return;
  const portion = parseFloat(document.getElementById('portionInput').value) || selectedFood.unitG;
  const ratio = portion / 100;
  // unitG'ye göre oran hesapla
  const baseRatio = selectedFood.unitG / 100;
  // Kullanıcı gram değil adet giriyorsa
  const isUnit = !['g','ml'].includes(selectedFood.unit);
  const actualRatio = isUnit ? (portion * selectedFood.unitG / 100) / 100 : ratio;

  document.getElementById('prevName').textContent = selectedFood.name;
  document.getElementById('prevPer').textContent = `${portion} ${selectedFood.unit} · ${Math.round(selectedFood.c * actualRatio)} kcal`;
  document.getElementById('prevMacros').innerHTML = [
    {l:'Protein',v:selectedFood.p,c:'#ff5f7e'},
    {l:'Karbonhidrat',v:selectedFood.k,c:'#4db8ff'},
    {l:'Yağ',v:selectedFood.y,c:'#b57bff'},
    {l:'Lif',v:selectedFood.f,c:'#00e5a0'},
  ].map(m=>`<span class="sfp-tag" style="color:${m.c}">${m.l}: ${(m.v*actualRatio).toFixed(1)}g</span>`).join('');
}

function confirmAdd() {
  if (!selectedFood) return;
  const portion = parseFloat(document.getElementById('portionInput').value) || selectedFood.unitG;
  const isUnit = !['g','ml'].includes(selectedFood.unit);
  const actualRatio = isUnit ? (portion * selectedFood.unitG / 100) / 100 : portion / 100;

  foods.push({
    id: Date.now(),
    name: selectedFood.name,
    portion: `${portion} ${selectedFood.unit}`,
    nutrition: {
      calories:  selectedFood.c  * actualRatio,
      protein:   selectedFood.p  * actualRatio,
      carbs:     selectedFood.k  * actualRatio,
      fat:       selectedFood.y  * actualRatio,
      fiber:     selectedFood.f  * actualRatio,
      sugar:     selectedFood.s  * actualRatio,
      sodium:    selectedFood.so * actualRatio,
      vitaminC:  selectedFood.vc * actualRatio,
      calcium:   selectedFood.ca * actualRatio,
      iron:      selectedFood.fe * actualRatio,
      potassium: selectedFood.po * actualRatio,
    }
  });

  selectedFood = null;
  document.getElementById('foodSearch').value = '';
  document.getElementById('selectedPreview').style.display = 'none';
  renderNutrition();
  renderDashboard();
}

// ════════════════════════════════════════════
// TOTALS
// ════════════════════════════════════════════
function getTotals() {
  return foods.reduce((a,f)=>{
    const n=f.nutrition||{};
    return {
      calories: a.calories+(n.calories||0), protein: a.protein+(n.protein||0),
      carbs: a.carbs+(n.carbs||0), fat: a.fat+(n.fat||0), fiber: a.fiber+(n.fiber||0),
      sugar: a.sugar+(n.sugar||0), sodium: a.sodium+(n.sodium||0),
      vitaminC: a.vitaminC+(n.vitaminC||0), calcium: a.calcium+(n.calcium||0),
      iron: a.iron+(n.iron||0), potassium: a.potassium+(n.potassium||0),
    };
  },{calories:0,protein:0,carbs:0,fat:0,fiber:0,sugar:0,sodium:0,vitaminC:0,calcium:0,iron:0,potassium:0});
}

// ════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════
function svgRing(val,max,color,size=84,stroke=9){
  const r=(size-stroke)/2,circ=2*Math.PI*r,pct=Math.min(val/max,1),dash=pct*circ;
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1e2733" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-dasharray="${dash} ${circ}" stroke-linecap="round"
      style="transition:stroke-dasharray .8s ease;filter:drop-shadow(0 0 6px ${color}88)"/>
  </svg>`;
}

function renderDashboard(){
  const t=getTotals(), burned=Math.round(steps*0.04), net=Math.round(t.calories)-burned;
  const macros=[
    {label:'KALORİ',val:t.calories,max:2000,color:'#f5c842'},
    {label:'PROTEİN',val:t.protein,max:150,color:'#ff5f7e'},
    {label:'KARBO',val:t.carbs,max:250,color:'#4db8ff'},
    {label:'YAĞ',val:t.fat,max:65,color:'#b57bff'},
  ];
  document.getElementById('macroRings').innerHTML=macros.map(m=>`
    <div class="macro-ring-wrap">
      <div style="position:relative">${svgRing(m.val,m.max,m.color)}
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:${m.color}">${Math.round(m.val)}</span>
          <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)">/${m.max}</span>
        </div>
      </div>
      <div class="macro-ring-lbl">${m.label}</div>
    </div>`).join('');

  document.getElementById('dashStats').innerHTML=[
    {icon:'👟',val:steps.toLocaleString('tr'),unit:'adım',lbl:'Bugün',color:'#00e5a0'},
    {icon:'🔥',val:burned,unit:'kcal',lbl:'Yakılan',color:'#ff5f7e'},
    {icon:'🥗',val:Math.round(t.calories),unit:'kcal',lbl:'Alınan',color:'#f5c842'},
    {icon:'⚖️',val:(net>=0?'+':'')+net,unit:'kcal',lbl:'Net',color:net>0?'#ff5f7e':'#00e5a0'},
  ].map(s=>`<div style="background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px 16px;position:relative;overflow:hidden">
    <div style="position:absolute;top:0;right:0;width:50px;height:50px;background:${s.color};opacity:.08;border-radius:0 18px 0 50px"></div>
    <div style="font-size:20px;margin-bottom:6px">${s.icon}</div>
    <div style="font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:${s.color}">${s.val}</div>
    <div style="font-size:11px;color:var(--muted);margin-top:3px">${s.unit} · ${s.lbl}</div>
  </div>`).join('');

  document.getElementById('dashProgress').innerHTML=[
    {label:'Adım',val:steps,max:stepGoal,color:'#00e5a0',unit:''},
    {label:'Kalori',val:t.calories,max:2000,color:'#f5c842',unit:'kcal'},
    {label:'Protein',val:t.protein,max:150,color:'#ff5f7e',unit:'g'},
    {label:'Lif',val:t.fiber,max:30,color:'#4db8ff',unit:'g'},
  ].map(p=>`<div class="prog-row">
    <div class="prog-header"><span>${p.label}</span><span class="prog-val">${Math.round(p.val)} / ${p.max} ${p.unit}</span></div>
    <div class="prog-track"><div class="prog-fill" style="width:${Math.min(p.val/p.max,1)*100}%;background:${p.color};box-shadow:0 0 6px ${p.color}66"></div></div>
  </div>`).join('');
}

// ════════════════════════════════════════════
// STEPS
// ════════════════════════════════════════════
function renderSteps(){
  const arc=document.getElementById('stepRingArc');
  if(arc) arc.setAttribute('stroke-dasharray',`${Math.min(steps/stepGoal,1)*578} 578`);
  const sd=document.getElementById('stepDisplay'); if(sd) sd.textContent=steps.toLocaleString('tr');
  const em=document.getElementById('stepEmoji'); if(em) em.textContent=counting?'🏃':steps>0?'🚶':'🧍';
  const btn=document.getElementById('startBtn');
  if(btn){btn.textContent=counting?'⏹ Durdur':'▶ Başlat';btn.className='btn '+(counting?'btn-danger':'btn-primary');}
  const burned=Math.round(steps*0.04);
  document.getElementById('stepStats').innerHTML=`
    <div class="stat-box"><div class="stat-icon">🔥</div><div class="stat-val" style="color:#ff5f7e">${burned}</div><div class="stat-lbl">kcal yakıldı</div></div>
    <div class="stat-box"><div class="stat-icon">📏</div><div class="stat-val" style="color:#4db8ff">${(steps*.00075).toFixed(2)}</div><div class="stat-lbl">km mesafe</div></div>
    <div class="stat-box"><div class="stat-icon">⏱️</div><div class="stat-val" style="color:#b57bff">${Math.round(steps/100)}</div><div class="stat-lbl">dk süre</div></div>`;
  document.getElementById('manualChips').innerHTML=
    [500,1000,2500,5000].map(n=>`<button class="btn-chip" onclick="steps+=${n};renderAll()">+${n>=1000?(n/1000)+'k':n}</button>`).join('');
}

async function toggleCounting(){
  if(!counting){
    // iOS requires DeviceMotionEvent.requestPermission() called directly from user gesture
    if(typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function'){
      let permission;
      try {
        permission = await DeviceMotionEvent.requestPermission();
      } catch(e) {
        permission = 'denied';
      }
      if(permission !== 'granted'){
        const ss=document.getElementById('sensorStatus'), st=document.getElementById('sensorText');
        if(ss) ss.className='sensor-status sensor-inactive';
        if(st) st.textContent='⚠️ İzin verilmedi — manuel ekleme kullanabilirsin';
        return;
      }
    } else if(typeof DeviceMotionEvent === 'undefined'){
      // Desktop or unsupported — just simulate
      const st=document.getElementById('sensorText');
      if(st) st.textContent='⚠️ Bu cihaz sensörü desteklemiyor';
      return;
    }
    counting=true; startMotion();
  } else {
    counting=false; stopMotion();
  }
  renderSteps();
}

function startMotion(){
  motionListener=function(e){
    const a=e.accelerationIncludingGravity||e.acceleration;
    if(!a||a.x==null) return;
    const mag=Math.sqrt(a.x*a.x+a.y*a.y+a.z*a.z);
    if(lastAcc===null){lastAcc=mag;return;}
    const delta=Math.abs(mag-lastAcc); lastAcc=mag;
    const now=Date.now();
    if(delta>STEP_THR&&(now-lastStepTime)>STEP_CD){lastStepTime=now;steps++;renderAll();}
  };
  window.addEventListener('devicemotion',motionListener);
  const ss=document.getElementById('sensorStatus'),st=document.getElementById('sensorText');
  if(ss){ss.className='sensor-status sensor-active';}
  if(st){st.textContent='İvme ölçeri aktif — adımlar sayılıyor';}
}

function stopMotion(){
  if(motionListener){window.removeEventListener('devicemotion',motionListener);motionListener=null;}
  lastAcc=null;
  const ss=document.getElementById('sensorStatus'),st=document.getElementById('sensorText');
  if(ss){ss.className='sensor-status sensor-inactive';}
  if(st){st.textContent='Sensör durduruldu';}
}

function resetSteps(){
  steps=0; if(counting){counting=false;stopMotion();} renderAll();
}

// ════════════════════════════════════════════
// NUTRITION RENDER
// ════════════════════════════════════════════
function renderNutrition(){
  const t=getTotals(), has=foods.length>0;
  document.getElementById('macroSummaryCard').style.display=has?'':'none';
  document.getElementById('microCard').style.display=has?'':'none';
  document.getElementById('foodListCard').style.display=has?'':'none';
  document.getElementById('emptyState').style.display=has?'none':'';

  if(has){
    document.getElementById('macroSummary').innerHTML=[
      {l:'Kalori',v:t.calories,u:'kcal',c:'#f5c842'},
      {l:'Protein',v:t.protein,u:'g',c:'#ff5f7e'},
      {l:'Karbonhidrat',v:t.carbs,u:'g',c:'#4db8ff'},
      {l:'Yağ',v:t.fat,u:'g',c:'#b57bff'},
      {l:'Lif',v:t.fiber,u:'g',c:'#00e5a0'},
      {l:'Şeker',v:t.sugar,u:'g',c:'#f5c842'},
    ].map(m=>`<div class="macro-box">
      <div class="macro-num" style="color:${m.c}">${Math.round(m.v)}<span class="macro-unit"> ${m.u}</span></div>
      <div class="macro-name">${m.l}</div>
    </div>`).join('');

    document.getElementById('microNutrients').innerHTML=[
      {n:'Sodyum',v:t.sodium,u:'mg',rdi:2300,c:'#ff5f7e'},
      {n:'Vitamin C',v:t.vitaminC,u:'mg',rdi:90,c:'#f5c842'},
      {n:'Kalsiyum',v:t.calcium,u:'mg',rdi:1000,c:'#4db8ff'},
      {n:'Demir',v:t.iron,u:'mg',rdi:18,c:'#b57bff'},
      {n:'Potasyum',v:t.potassium,u:'mg',rdi:3500,c:'#00e5a0'},
    ].map(m=>`<div class="micro-row">
      <div class="micro-header"><span class="micro-name">${m.n}</span><span class="micro-val">${m.v.toFixed(1)} ${m.u}</span></div>
      <div class="micro-track"><div class="micro-fill" style="width:${Math.min(m.v/m.rdi,1)*100}%;background:${m.c}"></div></div>
    </div>`).join('');

    document.getElementById('foodList').innerHTML=foods.map(f=>{
      const n=f.nutrition||{};
      return `<div class="food-item">
        <div style="flex:1">
          <div class="food-item-name">${f.name}</div>
          <div class="food-item-portion">${f.portion}</div>
          <div class="food-macros">
            <span class="food-macro-tag" style="color:#f5c842">${Math.round(n.calories||0)} kcal</span>
            <span class="food-macro-tag" style="color:#ff5f7e">P:${(n.protein||0).toFixed(1)}g</span>
            <span class="food-macro-tag" style="color:#4db8ff">K:${(n.carbs||0).toFixed(1)}g</span>
            <span class="food-macro-tag" style="color:#b57bff">Y:${(n.fat||0).toFixed(1)}g</span>
          </div>
        </div>
        <button class="del-btn" onclick="removeFood(${f.id})">✕</button>
      </div>`;
    }).join('');
  }
}

function removeFood(id){foods=foods.filter(f=>f.id!==id);renderNutrition();renderDashboard();}

function renderAll(){renderDashboard();renderSteps();renderNutrition();}

document.addEventListener("DOMContentLoaded",function(){
  var s=document.getElementById("startBtn");
  var r=document.getElementById("resetBtn");
  if(s) s.addEventListener("click",function(){toggleCounting();});
  if(r) r.addEventListener("click",function(){resetSteps();});
});
</script>
